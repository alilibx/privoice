name: privoice_workspace
publish_to: none

environment:
  sdk: ^3.12.2

# Dart pub workspace (Melos 8 uses this for package discovery + a shared lockfile).
workspace:
  - apps/mobile
  - packages/core
  - packages/audio
  - packages/stt

dev_dependencies:
  melos: ^8.2.0

# Upstream skew: record 5.2.1 caps record_linux <1.0 (only 0.7.2), which is far
# too old to implement the modern record_platform_interface. Flutter compiles the
# Linux impl even for Android builds, so this breaks the kernel snapshot.
# Fix: pin the whole federated set at interface 1.5.0 and force a record_linux
# that actually targets it (1.3.1 -> interface ^1.5.0). record_android ^1.5.0 and
# record_darwin ^1.2.0 both accept 1.5.0.
dependency_overrides:
  record_platform_interface: 1.5.0
  record_linux: 1.3.1

melos:
  name: privoice
  scripts:
    analyze:
      exec: flutter analyze
      description: Analyze all packages
    test:
      exec: flutter test
      description: Run tests in all packages
